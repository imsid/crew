kind: source
version: 1
id: orgs
dataset: product_usage_db
table: dim_orgs
subject:
  - org_id
dimensions:
  - name: org_id
    expr: org_id
    data_type: STRING
    is_primary_key: true
  - name: org_name
    expr: org_name
    data_type: STRING
  - name: org_state
    expr: org_state
    data_type: STRING
measures:
  - name: org_count
    expr: "1"
    agg: COUNT
    data_type: INT64
  - name: active_org_count
    expr: CASE WHEN org_state = 'ACTIVE' THEN 1 ELSE 0 END
    agg: SUM
    data_type: INT64
