kind: source
version: 1
id: user_activity
dataset: product_usage_db
table: user_activity
subject:
  - user_id
ts: activity_date
dimensions:
  - name: activity_date
    expr: activity_date
    data_type: DATE
  - name: product_surface
    expr: product_surface
    data_type: STRING
  - name: activity_type
    expr: activity_type
    data_type: STRING
  - name: user_id
    expr: user_id
    data_type: STRING
  - name: org_id
    expr: org_id
    data_type: STRING
measures:
  - name: activity_count_sum
    expr: activity_count
    agg: SUM
    data_type: INT64
  - name: tokens_consumed_sum
    expr: tokens_consumed
    agg: SUM
    data_type: INT64
  - name: event_count
    expr: "1"
    agg: COUNT
    data_type: INT64
