kind: source
version: 1
id: conversion_events
dataset: marketing_db
table: conversion_events
subject:
  - customer_id
ts: created_at
dimensions:
  - name: conversion_id
    expr: conversion_id
    data_type: INT64
  - name: customer_id
    expr: customer_id
    data_type: INT64
  - name: campaign_id
    expr: campaign_id
    data_type: INT64
  - name: created_at
    expr: created_at
    data_type: TIMESTAMP
measures:
  - name: conversion_count
    expr: conversion_id
    agg: COUNT_DISTINCT
    data_type: INT64
  - name: conversion_value_total
    expr: value
    agg: SUM
    data_type: NUMERIC
